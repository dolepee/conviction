name: Release gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run deterministic release gate
        run: npm run gate

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  linux-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install the released Rust toolchain
        run: |
          rustup toolchain install 1.96.1 --profile minimal
          rustup default 1.96.1
          rustc --version
          cargo --version

      - name: Build the pinned Linux x64 runtime
        env:
          CARGO_INCREMENTAL: "0"
          SOURCE_REPOSITORY: https://github.com/dolepee/plugin-store.git
          SOURCE_COMMIT: 49c952b98037f676b484625a4f389b42071213e7
        run: |
          set -euo pipefail
          build_root=$(mktemp -d)
          git init --quiet "$build_root"
          git -C "$build_root" remote add origin "$SOURCE_REPOSITORY"
          git -C "$build_root" fetch --quiet --depth 1 origin "$SOURCE_COMMIT"
          git -C "$build_root" checkout --quiet --detach FETCH_HEAD
          test "$(git -C "$build_root" rev-parse HEAD)" = "$SOURCE_COMMIT"
          crate="$build_root/skills/polymarket-plugin"
          cargo test --all-targets --locked --manifest-path "$crate/Cargo.toml"
          cargo build --release --locked --manifest-path "$crate/Cargo.toml"
          lock_sha=$(sha256sum "$crate/Cargo.lock" | awk '{print $1}')
          binary_sha=$(sha256sum "$crate/target/release/polymarket-plugin" | awk '{print $1}')
          echo "LINUX_X64_CARGO_LOCK_SHA256=$lock_sha"
          echo "LINUX_X64_BINARY_SHA256=$binary_sha"
