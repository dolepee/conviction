name: Release gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run deterministic release gate
        run: npm run gate

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  linux-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out merchant discovery release
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install the released Rust toolchain
        run: |
          rustup toolchain install 1.96.1 --profile minimal
          rustup default 1.96.1
          rustc --version
          cargo --version

      - name: Fetch and install from cold discovery
        env:
          CARGO_INCREMENTAL: "0"
        run: node scripts/cold-executor-gate.mjs --install
